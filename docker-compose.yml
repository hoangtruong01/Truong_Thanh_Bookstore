version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: truong-thanh-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - truong-thanh-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: truong-thanh-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/truong-thanh-stationery
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    networks:
      - truong-thanh-network

volumes:
  mongo-data:

networks:
  truong-thanh-network:
    driver: bridge
