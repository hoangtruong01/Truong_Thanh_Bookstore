name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Build project
        run: |
          cd backend
          npm run build

      - name: Run unit tests
        run: |
          cd backend
          npm run test
        env:
          MONGODB_URI: mongodb://localhost:27017/truongthanh_test
          JWT_SECRET: test_jwt_secret_key_123456

      - name: Run E2E tests
        run: |
          cd backend
          npx jest --config test/jest-e2e.json --runInBand
        env:
          MONGODB_URI: mongodb://localhost:27017/truongthanh_test
          JWT_SECRET: test_jwt_secret_key_123456
